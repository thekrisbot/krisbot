<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact — Krisbot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f0ead6;--black:#0e0e0e;--white:#f5f0e8;--yellow:#f7d94c;--red:#e03e2d;--blue:#2563eb;--green:#16a34a;--purple:#7c3aed;--muted:#6b6b6b;--border:#d4ccb4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--black);font-family:'Instrument Sans',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
/* HOME */
.s-home-grid{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 55px)}
.s-home-left{padding:70px 60px;display:flex;flex-direction:column;justify-content:center;border-right:2px solid var(--border)}
.s-home-right{display:flex;flex-direction:column}
.s-eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.s-hero-name{font-family:'Bebas Neue',sans-serif;font-size:90px;line-height:.9;letter-spacing:2px;margin-bottom:22px}
.s-hero-bio{font-family:'DM Serif Display',serif;font-size:20px;line-height:1.6;color:#333;max-width:400px}
.s-card{display:block;padding:28px 36px;border-bottom:2px solid var(--border);transition:background .15s}
.s-card:last-child{border-bottom:none}
.s-card:hover{background:var(--white)}
.s-card-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;color:white;display:inline-block;margin-bottom:10px}
.s-card-title{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:6px;line-height:1.3;color:var(--black)}
.s-card-desc{font-size:13px;color:var(--muted)}
/* SECTIONS */
.s-sec-header{padding:44px 60px 28px;border-bottom:2px solid var(--border)}
.s-sec-title{font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:2px;line-height:1;margin-bottom:10px}
.s-sec-desc{font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:var(--muted)}
.s-subtabs{display:flex;padding:0 60px;border-bottom:2px solid var(--border);background:var(--white)}
.s-subtab{padding:14px 24px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.s-content{padding:44px 60px}
.s-empty{font-family:'DM Serif Display',serif;font-style:italic;font-size:22px;color:var(--border)}
/* CONTACT */
.s-contact-wrap{max-width:640px;margin:0 auto;padding:70px 40px}
.s-contact-title{font-family:'Bebas Neue',sans-serif;font-size:68px;line-height:1;margin-bottom:20px}
.s-contact-bio{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.7;color:#333;margin-bottom:36px}
.s-contact-cards{display:flex;flex-direction:column;gap:10px}
.s-contact-card{display:flex;align-items:center;gap:16px;padding:16px 20px;border:2px solid var(--border);border-radius:3px;background:var(--white)}
.s-contact-card>span{font-size:20px}
.s-contact-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.s-contact-val{font-family:'DM Serif Display',serif;font-size:16px}
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="s-contact-wrap">
  <div class="s-eyebrow">Get in touch</div>
  <div class="s-contact-title">Contact</div>
  <div class="s-contact-bio">Say hi, pitch something, or just tell me I'm wrong. I read everything — eventually.</div>
  <div class="s-contact-cards">
    <div class="s-contact-card"><span>✉️</span><div><div class="s-contact-label">Email</div><div class="s-contact-val">hi@krisbot.lol</div></div></div>
    <div class="s-contact-card"><span>📸</span><div><div class="s-contact-label">Instagram</div><div class="s-contact-val">@yourusername</div></div></div>
    <div class="s-contact-card"><span>🐦</span><div><div class="s-contact-label">X / Twitter</div><div class="s-contact-val">@yourusername</div></div></div>
    <div class="s-contact-card"><span>▶️</span><div><div class="s-contact-label">YouTube</div><div class="s-contact-val">Sports Entertainment Weekly</div></div></div>
  </div>
</div>
</body>
</html>
