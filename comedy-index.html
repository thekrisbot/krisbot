<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Comedy — Krisbot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f0ead6;--black:#0e0e0e;--white:#f5f0e8;--yellow:#f7d94c;--red:#e03e2d;--blue:#2563eb;--green:#16a34a;--muted:#6b6b6b;--border:#d4ccb4;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--black);font-family:'Instrument Sans',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
.s-nav{background:var(--black);padding:10px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--yellow);position:sticky;top:0;z-index:100}
.s-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--yellow)}
.s-logo-white{color:var(--white)}
.s-nav-tabs{display:flex;gap:4px}
.s-nav-tab{padding:8px 18px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;border:1.5px solid transparent;border-radius:2px;color:var(--white);background:transparent;text-decoration:none;transition:all .15s}
.s-nav-tab:hover{border-color:var(--yellow);color:var(--yellow)}
.a-home,.a-contact{background:var(--yellow)!important;color:var(--black)!important;border-color:var(--yellow)!important}
.a-comedy{background:var(--red)!important;color:white!important;border-color:var(--red)!important}
.a-sports{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important}
.a-butwhy{background:var(--green)!important;color:white!important;border-color:var(--green)!important}
.a-profiles{background:var(--purple)!important;color:white!important;border-color:var(--purple)!important}
.s-home-grid{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 55px)}
.s-home-left{padding:70px 60px;display:flex;flex-direction:column;justify-content:center;border-right:2px solid var(--border)}
.s-home-right{display:grid;grid-template-rows:repeat(5,1fr)}
.s-card{padding:28px 34px;border-bottom:2px solid var(--border)}
.s-card:last-child{border-bottom:none}
.s-sec-header{padding:44px 60px 28px;border-bottom:2px solid var(--border)}
.s-subtabs{display:flex;padding:0 60px;border-bottom:2px solid var(--border);background:var(--white)}
.s-subtab{padding:14px 24px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.s-content{padding:44px 60px}
.s-contact-wrap{max-width:640px;margin:0 auto;padding:70px 40px}
.s-contact-card{display:flex;align-items:center;gap:16px;padding:16px 20px;border:2px solid var(--border);border-radius:3px;background:var(--white);margin-bottom:10px}
.s-newsletter{background:var(--black);padding:48px 60px;border-top:3px solid var(--yellow)}
input[type=email]{flex:1;background:var(--white);border:2px solid var(--border);color:var(--black);font-family:'Instrument Sans',sans-serif;font-size:14px;padding:11px 15px;border-radius:3px;outline:none}
input[type=email]:focus{border-color:var(--yellow)}

.post-card{display:block;padding:22px 0;border-bottom:2px solid var(--border);text-decoration:none;color:inherit;transition:background .15s}
.post-card:first-child{border-top:2px solid var(--border)}
.post-card:hover{background:var(--white);margin:0 -60px;padding-left:60px;padding-right:60px}
.post-card-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;color:#fff;display:inline-block;margin-bottom:8px}
.post-card-title{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.3;margin-bottom:6px;color:var(--black)}
.post-card-sub{font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;color:var(--muted);margin-bottom:6px}
.post-card-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}
.s-empty{font-family:'DM Serif Display',serif;font-style:italic;font-size:22px;color:var(--border)}
</style>
</head>
<body>
<div class="s-nav">
  <a class="s-logo" href="/"><span>KRIS</span><span class="s-logo-white">BOT</span></a>
  <div class="s-nav-tabs">
    <a class="s-nav-tab" href="/">Home</a>
    <a class="s-nav-tab a-comedy" href="/comedy">Comedy</a>
    <a class="s-nav-tab" href="/sew">Sports (SEW)</a>
    <a class="s-nav-tab" href="/butwhy">But Why Though</a>
    <a class="s-nav-tab" href="/profile">Profiles</a>
    <a class="s-nav-tab" href="/contact">Contact</a>
  </div>
</div>
<div class="s-sec-header">
  <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:10px">A · Section</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:2px;line-height:1;color:var(--red);margin-bottom:10px">Comedy</div>
  <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:var(--muted)">Sketches, packets, and bits — updated regularly</div>
</div>
<div style="font-family:'DM Mono',monospace;padding:14px 24px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">A2 · Other Bits</div>
</div>
<div class="s-subtabs" id="subtabs-bar" style="display:none"></div>
<div class="s-content" id="posts">
  <div class="s-empty">Loading...</div>
</div>
<script>
(function() {
  var sec = 'comedy';
  var color = '#e03e2d';
  fetch('/posts.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var allPosts = (data.posts || []).filter(function(p) { return p.section === sec; });
      var subtabs = (data.subtabs || {})[sec] || [];
      var activeSubtab = subtabs[0] || null;

      function renderSubtabs() {
        var bar = document.getElementById('subtabs-bar');
        if (subtabs.length <= 1) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        bar.innerHTML = subtabs.map(function(st, i) {
          var isActive = st === activeSubtab;
          return '<div class="s-subtab-btn" onclick="window.__setSubtab(\'' + st.replace(/'/g,"\'") + '\')" style="font-family:'DM Mono',monospace;padding:14px 24px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;' + (isActive ? 'color:' + color + ';border-bottom:3px solid ' + color + ';margin-bottom:-2px;' : 'color:#6b6b6b;') + '">' + st + '</div>';
        }).join('');
      }

      function renderPosts() {
        var el = document.getElementById('posts');
        var filtered = activeSubtab && subtabs.length > 1
          ? allPosts.filter(function(p) { return p.subtab === activeSubtab; })
          : allPosts;
        if (!filtered.length) {
          el.innerHTML = '<div class="s-empty">No posts here yet — check back soon.</div>';
          return;
        }
        el.innerHTML = filtered.map(function(p) {
          return '<a class="post-card" href="/' + sec + '/' + p.slug + '.html">'
            + '<span class="post-card-tag" style="background:' + color + '">' + p.subtab + '</span>'
            + '<div class="post-card-title">' + p.title + '</div>'
            + (p.subtitle ? '<div class="post-card-sub">' + p.subtitle + '</div>' : '')
            + '<div class="post-card-meta">' + (p.date ? new Date(p.date + 'T12:00:00').toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'}) : '') + '</div>'
            + '</a>';
        }).join('');
      }

      window.__setSubtab = function(st) {
        activeSubtab = st;
        renderSubtabs();
        renderPosts();
      };

      renderSubtabs();
      renderPosts();
    })
    .catch(function() {
      document.getElementById('posts').innerHTML = '<div class="s-empty">No posts yet — check back soon.</div>';
    });
})();
</script>
<div class="s-newsletter">
  <div style="max-width:560px">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:10px">✦ Newsletter</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--white);margin-bottom:8px">GET NEW POSTS</div>
    <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:16px;color:#888;margin-bottom:16px">Drop your email. I'll hit you when I publish something. No spam, ever.</div>
    <div style="display:flex;gap:10px">
      <input type="email" placeholder="your@email.com" style="flex:1;background:var(--white);border:2px solid var(--border);color:var(--black);font-family:'Instrument Sans',sans-serif;font-size:14px;padding:11px 15px;border-radius:3px;outline:none">
      <button style="padding:11px 22px;background:var(--black);color:var(--yellow);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;border:2px solid var(--yellow);border-radius:3px;cursor:pointer">SUBSCRIBE</button>
    </div>
  </div>
</div>
</body>
</html>
