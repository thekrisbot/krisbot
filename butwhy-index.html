<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>But Why Though — Krisbot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f0ead6;--black:#0e0e0e;--white:#f5f0e8;--yellow:#f7d94c;--red:#e03e2d;--blue:#2563eb;--green:#16a34a;--muted:#6b6b6b;--border:#d4ccb4;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--black);font-family:'Instrument Sans',sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
.s-nav{background:var(--black);padding:10px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--yellow);position:sticky;top:0;z-index:100}
.s-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--yellow)}
.s-logo-white{color:var(--white)}
.s-nav-tabs{display:flex;gap:4px}
.s-nav-tab{padding:8px 18px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;border:1.5px solid transparent;border-radius:2px;color:var(--white);background:transparent;text-decoration:none;transition:all .15s}
.s-nav-tab:hover{border-color:var(--yellow);color:var(--yellow)}
.a-home,.a-contact{background:var(--yellow)!important;color:var(--black)!important;border-color:var(--yellow)!important}
.a-comedy{background:var(--red)!important;color:white!important;border-color:var(--red)!important}
.a-sports{background:var(--blue)!important;color:white!important;border-color:var(--blue)!important}
.a-butwhy{background:var(--green)!important;color:white!important;border-color:var(--green)!important}
.a-profiles{background:var(--purple)!important;color:white!important;border-color:var(--purple)!important}
.s-home-grid{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 55px)}
.s-home-left{padding:70px 60px;display:flex;flex-direction:column;justify-content:center;border-right:2px solid var(--border)}
.s-home-right{display:grid;grid-template-rows:repeat(5,1fr)}
.s-card{padding:28px 34px;border-bottom:2px solid var(--border)}
.s-card:last-child{border-bottom:none}
.s-sec-header{padding:44px 60px 28px;border-bottom:2px solid var(--border)}
.s-subtabs{display:flex;padding:0 60px;border-bottom:2px solid var(--border);background:var(--white)}
.s-subtab{padding:14px 24px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.s-content{padding:44px 60px}
.s-contact-wrap{max-width:640px;margin:0 auto;padding:70px 40px}
.s-contact-card{display:flex;align-items:center;gap:16px;padding:16px 20px;border:2px solid var(--border);border-radius:3px;background:var(--white);margin-bottom:10px}
.s-newsletter{background:var(--black);padding:48px 60px;border-top:3px solid var(--yellow)}
input[type=email]{flex:1;background:var(--white);border:2px solid var(--border);color:var(--black);font-family:'Instrument Sans',sans-serif;font-size:14px;padding:11px 15px;border-radius:3px;outline:none}
input[type=email]:focus{border-color:var(--yellow)}
</style>
</head>
<body>
<div class="s-nav">
  <a class="s-logo" href="/"><span>KRIS</span><span class="s-logo-white">BOT</span></a>
  <div class="s-nav-tabs">
    <a class="s-nav-tab" href="/">Home</a>
    <a class="s-nav-tab" href="/comedy">Comedy</a>
    <a class="s-nav-tab" href="/sew">Sports (SEW)</a>
    <a class="s-nav-tab a-butwhy" href="/butwhy">But Why Though</a>
    <a class="s-nav-tab" href="/profile">Profiles</a>
    <a class="s-nav-tab" href="/attention">Attention Economy</a>
    <a class="s-nav-tab" href="/contact">Contact</a>
  </div>
</div>
<div class="s-sec-header">
  <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:10px">C · Section</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:2px;line-height:1;color:var(--green);margin-bottom:10px">But Why Though</div>
  <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:var(--muted)">Essays on things that don't need essays but got them anyway</div>
</div>
<div class="s-content" id="posts">
  <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:22px;color:var(--border)">Loading...</div>
</div>
<script>
(function(){
  var sec="butwhy", color="#16a34a", PAGE=0, PER=5, curList=[];

  function fetchExcerpt(slug, cb) {
    fetch("/"+sec+"/"+slug+".html")
      .then(function(r){return r.text();})
      .then(function(html){
        var tmp=document.createElement("div");
        tmp.innerHTML=html;
        var body=tmp.querySelector(".body");
        var p=body?body.querySelector("p"):null;
        var text=p?p.textContent.trim():"";
        cb(text.length>160?text.slice(0,160)+"…":text);
      }).catch(function(){cb("");});
  }

  function renderTabs(){
    var bar=document.getElementById("subtabs-bar");
    if(!window._subtabs||window._subtabs.length<=1){bar.style.display="none";return;}
    bar.style.display="flex";
    bar.innerHTML=window._subtabs.map(function(st){
      var on=st===window._active;
      return '<div onclick="window.__st(\''+st+'\')" style="font-family:monospace;padding:14px 24px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;'+(on?'color:'+color+';border-bottom:3px solid '+color+';margin-bottom:-2px;':'color:#6b6b6b;')+'">'+st+'</div>';
    }).join("");
  }

  function renderPage(){
    var el=document.getElementById("posts");
    var slice=curList.slice(PAGE*PER, PAGE*PER+PER);
    if(!slice.length){el.innerHTML="<p style='font-style:italic;color:#bbb;font-size:18px'>No posts here yet.</p>";return;}
    el.innerHTML="<div id='cards-wrap'></div><div id='pagination' style='display:flex;gap:10px;padding-top:24px'></div>";
    var wrap=document.getElementById("cards-wrap");
    var done=0;
    slice.forEach(function(p, i){
      var d=p.date?new Date(p.date+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):"";
      var card=document.createElement("div");
      card.innerHTML="<a href='/"+sec+"/"+p.slug+".html' style='display:block;padding:24px 0;border-bottom:2px solid #d4ccb4;text-decoration:none;color:inherit'>"
        +"<div style='font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;background:"+color+";color:white;display:inline-block;margin-bottom:8px'>"+(p.subtab||"")+"</div>"
        +"<div style='font-family:serif;font-size:22px;margin-bottom:4px'>"+p.title+"</div>"
        +(p.subtitle?"<div style='font-size:14px;color:#6b6b6b;margin-bottom:6px'>"+p.subtitle+"</div>":"")
        +"<div id='ex"+i+"' style='font-size:14px;color:#444;line-height:1.6;margin-bottom:8px'></div>"
        +"<div style='font-size:11px;color:#6b6b6b'>"+d+"</div>"
        +"</a>";
      wrap.appendChild(card);
      (function(idx, slug){
        fetchExcerpt(slug, function(text){
          var ex=document.getElementById("ex"+idx);
          if(ex&&text) ex.textContent=text;
          done++;
          if(done===slice.length) renderPagination();
        });
      })(i, p.slug);
    });
  }

  function renderPagination(){
    var total=Math.ceil(curList.length/PER);
    if(total<=1) return;
    var el=document.getElementById("pagination");
    if(!el) return;
    var btns="";
    if(PAGE>0) btns+="<button onclick='window.__pg("+(PAGE-1)+")' style='padding:8px 16px;font-family:monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;border:2px solid #d4ccb4;background:transparent;cursor:pointer'>prev</button>";
    btns+="<span style='padding:8px 12px;font-family:monospace;font-size:11px;color:#6b6b6b'>"+(PAGE+1)+" / "+total+"</span>";
    if(PAGE<total-1) btns+="<button onclick='window.__pg("+(PAGE+1)+")' style='padding:8px 16px;font-family:monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;border:2px solid #d4ccb4;background:transparent;cursor:pointer'>next</button>";
    el.innerHTML=btns;
  }

  fetch("/posts.json").then(function(r){return r.json();}).then(function(data){
    var all=(data.posts||[]).filter(function(p){return p.section===sec;});
    window._subtabs=(data.subtabs||{})[sec]||[];
    window._active=window._subtabs[0]||null;
    curList=window._active&&window._subtabs.length>1?all.filter(function(p){return p.subtab===window._active;}):all;
    renderTabs();
    renderPage();
  }).catch(function(){
    document.getElementById("posts").innerHTML="<p style='font-style:italic;color:#bbb;font-size:18px'>No posts yet.</p>";
  });

  window.__st=function(st){
    window._active=st; PAGE=0;
    fetch("/posts.json").then(function(r){return r.json();}).then(function(data){
      var all=(data.posts||[]).filter(function(p){return p.section===sec;});
      curList=st?all.filter(function(p){return p.subtab===st;}):all;
      renderTabs(); renderPage();
    });
  };
  window.__pg=function(n){PAGE=n;renderPage();window.scrollTo(0,0);};
})();
</script>
</div>
<div class="s-newsletter">
  <div style="max-width:560px">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:10px">✦ Newsletter</div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--white);margin-bottom:8px">GET NEW POSTS</div>
    <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:16px;color:#888;margin-bottom:16px">Drop your email. I'll hit you when I publish something. No spam, ever.</div>
    <div style="display:flex;gap:10px">
      <input type="email" placeholder="your@email.com" style="flex:1;background:var(--white);border:2px solid var(--border);color:var(--black);font-family:'Instrument Sans',sans-serif;font-size:14px;padding:11px 15px;border-radius:3px;outline:none">
      <button style="padding:11px 22px;background:var(--black);color:var(--yellow);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;border:2px solid var(--yellow);border-radius:3px;cursor:pointer">SUBSCRIBE</button>
    </div>
  </div>
</div>
</body>
</html>
